<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comic Gallery - CoX Mod Adventure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap');
    body { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-[100dvh] bg-slate-950 text-slate-100">
  <nav class="py-6 px-6 border-b border-slate-800">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <a href="/" class="text-xl font-bold">CoX Mod Adventure</a>
    </div>
  </nav>

  <section class="py-12 px-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-4xl font-bold mb-8">Comic Variations</h1>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <a href="/pages/v1/Comic/" class="border border-slate-800 rounded-lg p-6 hover:border-blue-600">
          <h3 class="text-xl font-bold mb-2">Clean Guide (v1)</h3>
          <p class="text-slate-400 text-sm">Simple step-by-step walkthrough</p>
        </a>
        
        <a href="/pages/v2/Comic/" class="border border-slate-800 rounded-lg p-6 hover:border-red-600">
          <h3 class="text-xl font-bold mb-2">KAPOW! Edition (v2)</h3>
          <p class="text-slate-400 text-sm">Classic comic book action style</p>
        </a>
        
        <a href="/pages/v3/Comic/" class="border border-slate-800 rounded-lg p-6 hover:border-red-800">
          <h3 class="text-xl font-bold mb-2">Noir Files (v3)</h3>
          <p class="text-slate-400 text-sm">Detective case file storytelling</p>
        </a>
        
        <a href="/pages/v4/Comic/" class="border border-slate-800 rounded-lg p-6 hover:border-pink-500">
          <h3 class="text-xl font-bold mb-2">Manga (v4)</h3>
          <p class="text-slate-400 text-sm">Japanese manga storytelling style</p>
        </a>
        
        <a href="/pages/v5/Comic/" class="border border-slate-800 rounded-lg p-6 hover:border-orange-600">
          <h3 class="text-xl font-bold mb-2">Graphic Novel (v5)</h3>
          <p class="text-slate-400 text-sm">Gritty comic panel aesthetic</p>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
