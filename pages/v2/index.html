<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoX Mod Adventure - KAPOW! Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400&family=Permanent+Marker&display=swap');
    body { 
      font-family: 'Bebas Neue', cursive;
      background: #000;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.15) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(0,0,255,0.15) 0%, transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255,255,0,0.1) 0%, transparent 40%);
    }
    .comic-panel {
      border: 4px solid white;
      box-shadow: 8px 8px 0 rgba(255,255,255,0.3);
      background: linear-gradient(45deg, #1a1a2e 0%, #16213e 100%);
    }
    .action-text {
      font-family: 'Permanent Marker', cursive;
      text-shadow: 3px 3px 0 #ff0000, -1px -1px 0 #ff0000, 1px -1px 0 #ff0000, -1px 1px 0 #ff0000;
    }
    .ben-day-dots {
      background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="min-h-[100dvh] text-white relative">
  <!-- Comic-style Hero -->
  <section class="relative py-20 px-6 text-center">
    <div class="max-w-5xl mx-auto">
      <div class="comic-panel ben-day-dots rounded-xl p-12 mb-12">
        <h1 class="text-7xl md:text-8xl font-bold mb-4 action-text">KAPOW!</h1>
        <h2 class="text-3xl md:text-5xl mb-8">CoX MOD ADVENTURE</h2>
        <p class="text-xl md:text-2xl leading-relaxed">
          YOUR HERO NEEDS ENHANCEMENTS!
        </p>
      </div>
    </div>
  </section>

  <!-- Action Stats -->
  <section class="px-6 mb-16">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="comic-panel p-8 text-center">
        <div class="text-5xl font-bold text-red-400">291</div>
        <div class="text-lg">MODS</div>
      </div>
      <div class="comic-panel p-8 text-center">
        <div class="text-5xl font-bold text-yellow-300">31K+</div>
        <div class="text-lg">DOWNLOADS</div>
      </div>
      <div class="comic-panel p-8 text-center">
        <div class="text-5xl font-bold text-blue-400">8</div>
        <div class="text-lg">CATEGORIES</div>
      </div>
    </div>
  </section>

  <!-- Comic Grid - Ben-Day Style -->
  <section class="px-6 pb-16">
    <div class="max-w-5xl mx-auto">
      <h3 class="text-3xl font-bold text-center mb-8">POWER UP YOUR HERO!</h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <a href="#" class="comic-panel p-6 text-center hover:scale-105 transition-transform">
          <div class="text-4xl mb-2">🗺️</div>
          <div class="text-xl font-bold mb-1">MAPS</div>
          <div class="text-sm">VIDEOTMAPS + MORE</div>
        </a>
        
        <a href="#" class="comic-panel p-6 text-center hover:scale-105 transition-transform">
          <div class="text-4xl mb-2">🎵</div>
          <div class="text-xl font-bold mb-1">AUDIO</div>
          <div class="text-sm">SFX PACKS</div>
        </a>
        
        <a href="#" class="comic-panel p-6 text-center hover:scale-105 transition-transform">
          <div class="text-4xl mb-2">🎨</div>
          <div class="text-xl font-bold mb-1">GRAPHICS</div>
          <div class="text-sm">TEXTURES</div>
        </a>
        
        <a href="#" class="comic-panel p-6 text-center hover:scale-105 transition-transform">
          <div class="text-4xl mb-2">⚡</div>
          <div class="text-xl font-bold mb-1">GUI</div>
          <div class="text-sm">ICONS</div>
        </a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="py-8 text-center border-t-2 border-white">
    <div class="text-lg">COX MOD ADVENTURE • HEROES NEVER SLEEP</div>
  </footer>
</body>
</html>
