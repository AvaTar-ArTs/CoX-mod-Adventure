<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヒーローズジャーニー - Manga Comic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=RocknRoll+One&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; background: #1a1a2e; }
    .manga-panel { border: 2px solid #ff6b6b; background: #0f0f23; }
    .scream-text { font-family: 'RocknRoll One', sans-serif; letter-spacing: 0.1em; }
  </style>
</head>
<body class="min-h-[100dvh] text-white">
  <nav class="py-6 px-6 border-b-2 border-red-500">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="/pages/v4/" class="text-xl scream-text">← 戻る</a>
      <span class="text-xl scream-text">ヒーローズジャーニー</span>
    </div>
  </nav>

  <section class="py-12 px-6">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-5xl font-black mb-8 text-center scream-text">物語</h1>
      
      <div class="space-y-6">
        <div class="manga-panel p-6 transform skew-y-1">
          <div class="text-2xl scream-text mb-3 text-red-400">1話</div>
          <p class="text-lg">291個のMODが待っている...</p>
        </div>
        
        <div class="manga-panel p-6 transform -skew-y-1">
          <div class="text-2xl scream-text mb-3 text-red-400">2話</div>
          <p class="text-lg">ダウンロード開始！</p>
        </div>
        
        <div class="manga-panel p-6 transform skew-y-1">
          <div class="text-2xl scream-text mb-3 text-red-400">3話</div>
          <p class="text-lg">インストール完了！</p>
        </div>
        
        <div class="manga-panel p-6 transform -skew-y-1">
          <div class="text-2xl scream-text mb-3 text-red-400">4話</div>
          <p class="text-lg">ヒーロー誕生！</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
