<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evidence - Noir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;900&family=Source+Code+Pro:wght@400;600&display=swap');
    body { font-family: 'Playfair Display', serif; background: #1a0000; color: #e0e0e0; }
    .noir-panel { background: rgba(0,0,0,0.6); border-left: 3px solid #ff0000; }
    .typewriter { font-family: 'Source Code Pro', monospace; }
  </style>
</head>
<body class="min-h-[100dvh]">
  <nav class="py-6 px-6 border-b border-red-900">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="/pages/v3/" class="text-xl font-bold text-red-500">← CASE CLOSED</a>
      <span class="text-xl font-bold">EVIDENCE</span>
    </div>
  </nav>

  <section class="py-12 px-6">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-4xl font-bold mb-8 border-b-2 border-red-500 pb-2">THE FILES</h1>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="noir-panel p-6">
          <h3 class="text-2xl font-bold mb-3 text-red-500">MAPS</h3>
          <p class="typewriter text-sm mb-3">291 files. 31K downloads logged.</p>
          <a href="#" class="text-red-400 text-sm">VIEW →</a>
        </div>
        
        <div class="noir-panel p-6">
          <h3 class="text-2xl font-bold mb-3 text-red-500">AUDIO</h3>
          <p class="typewriter text-sm mb-3">Sound surveillance complete.</p>
          <a href="#" class="text-red-400 text-sm">PLAYBACK →</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
