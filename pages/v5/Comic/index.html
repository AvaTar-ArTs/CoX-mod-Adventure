<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GRITTY FILES - Graphic Novel Comic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400}&family=Oswald:wght@400;600;700&display=swap');
    body { font-family: 'Oswald', sans-serif; background: #111; }
    .comic-book { 
      background: rgba(0,0,0,0.7);
      border: 6px double #ff3333;
      clip-path: polygon(
        0% 2%, 1% 0%, 3% 1%, 5% 0%, 7% 2%, 9% 0%,
        100% 0%, 100% 100%, 93% 100%, 91% 98%, 89% 100%,
        1% 100%, 0% 98%
      );
    }
    .bold-title { font-family: 'Bebas Neue', cursive; letter-spacing: 0.08em; }
  </style>
</head>
<body class="min-h-[100dvh] text-gray-100">
  <nav class="py-6 px-6 border-b-2 border-red-500">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <a href="/pages/v5/" class="text-xl bold-title text-red-500">← BACK</a>
      <span class="text-xl bold-title">GRITTY FILES</span>
    </div>
  </nav>

  <section class="py-12 px-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-6xl font-black mb-8 text-center bold-title">CASE FILES</h1>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="comic-book p-8">
          <div class="bold-title text-2xl mb-3 text-red-500">RED FILES</div>
          <p class="text-sm mb-3">Maps, Popmenus - Navigation & UI</p>
          <p>31,337 downloads. The city's veins mapped.</p>
        </div>
        
        <div class="comic-book p-8">
          <div class="bold-title text-2xl mb-3 text-blue-500">BLUE FILES</div>
          <p class="text-sm mb-3">Audio, Graphics - Atmosphere</p>
          <p>Sound replacements. Visual tweaks.</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
